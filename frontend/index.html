<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Strava Injury Risk</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="/frontend/main.css">
</head>

<body>

<div class="app">

  <!-- Sidebar -->
  <nav class="sidebar">

    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2L4 7v10l8 5 8-5V7z" fill="white"/></svg>
    </div>

    <a class="nav-icon active" data-page="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
    </a>

    <a class="nav-icon" data-page="activity">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
    </a>

    <a class="nav-icon" data-page="history">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
        <circle cx="12" cy="12" r="9"/>
        <polyline points="12 7 12 12 15 15"/>
      </svg>
    </a>

    <!-- Routes tab: map pin icon -->
    <a class="nav-icon" data-page="routes">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
        <circle cx="12" cy="9" r="2.5"/>
      </svg>
    </a>

    <a class="nav-icon sync-icon" style="margin-top:auto;">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 1 0 .49-4.5"/>
      </svg>
    </a>

  </nav>

  <div class="main-area">

    <!-- DASHBOARD -->
    <div id="dashboard" class="page visible">

      <div class="page-header">
        <span class="page-title">Risk Overview</span>
        <div class="athlete-chip">
          <div class="avatar" id="avatar"></div>
          <span id="athleteName"></span>
        </div>
      </div>

      <div class="content">

        <div class="card risk-card">
          <div class="risk-header">
            <span class="section-label">Injury Risk Score</span>
            <span class="badge badge--red" id="riskLevel"></span>
          </div>
          <div class="risk-score-row">
            <span class="risk-number" id="riskScore"></span>
            <span class="risk-denom">/ 100</span>
          </div>
          <p class="risk-desc" id="riskDesc"></p>
          <div class="risk-bar-track">
            <div class="risk-bar-fill" id="riskBar"></div>
          </div>
        </div>

        <div class="card">
          <div class="chart-wrap" style="height:160px;">
            <canvas id="loadChart"></canvas>
          </div>
        </div>

        <div class="card">
          <div class="section-label" style="margin-bottom:12px;">Recommendations</div>
          <div class="alert-list" id="alerts"></div>
        </div>

      </div>
    </div>

    <!-- ACTIVITY -->
    <div id="activity" class="page">
      <div class="activity-hero">
        <h1 class="activity-name">Select an Activity</h1>
      </div>

      <div class="input-bar">
        <div class="input-row">
          <input class="activity-input mono" placeholder="Strava Activity ID">
          <button class="plot-btn" id="plotBtn">Plot</button>
        </div>
      </div>

      <div class="content">
        <div class="card">
          <div class="chart-wrap" style="height:180px;">
            <canvas id="hrChart"></canvas>
          </div>
        </div>
      </div>
    </div>

    <!-- HISTORY -->
    <div id="history" class="page">
      <div class="page-header">
        <span class="page-title">Activity History</span>
      </div>

      <div class="content">
        <div class="card">
          <table class="history-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Activity</th>
                <th>Type</th>
                <th>Distance</th>
                <th>Avg HR</th>
                <th>TSS</th>
                <th>Risk</th>
              </tr>
            </thead>
            <tbody id="historyTable"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ROUTES -->
    <div id="routes" class="page">
      <div class="page-header">
        <span class="page-title">Common Routes</span>
        <span class="badge badge--teal" style="font-size:10px; padding:3px 9px;">
          Clustered
        </span>
      </div>

      <div class="routes-layout">

        <!-- Left: route list -->
        <div class="routes-list-panel">
          <div class="routes-list-header">
            <span class="section-label">Frequent Routes</span>
            <span class="section-label" style="color:#4a9eff;">ordered by frequency</span>
          </div>
          <div id="routesList" class="routes-list"></div>
        </div>

        
        <div id="matchCard" class="match-card hidden">
          <div class="match-header">
            <span>Matches</span>
          </div>
          <div id="matchList" class="match-list"></div>
        </div>

        <!-- Right: map panel (slides in) -->
        <div id="routeMapPanel" class="map-panel">
          <div class="map-panel-header">
            <div class="map-panel-info">
              <span class="map-route-name" id="mapRouteName">—</span>
              <div class="map-route-stats">
                <span class="mono" id="mapRouteDist">—</span>
                <span class="route-dot">·</span>
                <span class="mono" id="mapRouteCount">—</span>
              </div>
            </div>
            <button class="mapbtn" id="closeMapBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" width="16" height="16">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
            <button class="mapbtn" id="drawRouteBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" width="16" height="16" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 21l3-1 12-12-2-2L4 18l-1 3z"/>
                <path d="M14 4l2 2"/>
              </svg>
            </button>
            <button class="mapbtn" id="findRouteBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" width="16" height="16" stroke-linecap="round">
                <circle cx="11" cy="11" r="7"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
            </button>
            <button class="mapbtn" id="clearDrawbtn" title="Clear drawing">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" width="16" height="16" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14H6L5 6"/>
                <path d="M10 11v6M14 11v6"/>
                <path d="M9 6V4h6v2"/>
              </svg>
            </button>
          </div>


       
          <div id="leafletMap" class="leaflet-map"></div>
          <div class="map-legend">
            <div class="map-legend-item">
              <div class="map-legend-dot" style="background:#1dd3b0;"></div>
              <span>Start</span>
            </div>
            <div class="map-legend-item">
              <div class="map-legend-dot" style="background:#f03e3e;"></div>
              <span>End</span>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module" src="/frontend/app.js"></script>

</body>
</html>
